plugins {
    id 'java'
}

group = 'com.rizakara.betterbhhb'
version = '1.0.0'

repositories {
    mavenCentral()
}

dependencies {
    compileOnly 'net.portswigger.burp.extensions:montoya-api:2026.2'
}

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

jar {
    archiveBaseName.set('better-bhhb')
    manifest {
        attributes(
                'Implementation-Title': 'Better-BHHB',
                'Implementation-Version': version
        )
    }
}