<mat-toolbar>
    <nav class="navbar-header">
        <svg class="app-logo" version="1.1" height="22" viewBox="0 0 108 22" xmlns="http://www.w3.org/2000/svg" xmlns:svg="http://www.w3.org/2000/svg">
            <text x="1" y="16" font-family="'Nunito', sans-serif" font-weight="900" font-size="16" fill="#177FC5">better<tspan fill="currentColor">-bhhb</tspan></text>
        </svg>
        <button mat-icon-button aria-label="info" (click)="infoDialog()" matTooltip="Info">
            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="currentColor">
                <path
                    d="M480-280q17 0 28.5-11.5T520-320v-160q0-17-11.5-28.5T480-520q-17 0-28.5 11.5T440-480v160q0 17 11.5 28.5T480-280Zm0-320q17 0 28.5-11.5T520-640q0-17-11.5-28.5T480-680q-17 0-28.5 11.5T440-640q0 17 11.5 28.5T480-600Zm0 520q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Z" />
            </svg>
        </button>
        <button mat-icon-button aria-label="Theme" [matMenuTriggerFor]="themeMenu" matTooltip="Theme">
            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 0 24 24" width="24px" fill="currentColor">
                <path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01-.23-.26-.38-.61-.38-.99 0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8zm-5.5 9c-.83 0-1.5-.67-1.5-1.5S5.67 9 6.5 9 8 9.67 8 10.5 7.33 12 6.5 12zm3-4C8.67 8 8 7.33 8 6.5S8.67 5 9.5 5s1.5.67 1.5 1.5S10.33 8 9.5 8zm5 0c-.83 0-1.5-.67-1.5-1.5S13.67 5 14.5 5s1.5.67 1.5 1.5S15.33 8 14.5 8zm3 4c-.83 0-1.5-.67-1.5-1.5S17.67 9 18.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
            </svg>
        </button>
        <mat-menu #themeMenu="matMenu" class="import-menu-panel">
            <div class="theme-menu-section" (click)="$event.stopPropagation()">
                <div class="theme-menu-label">Dark</div>
                <button mat-menu-item *ngFor="let t of themeService.darkThemes"
                    (click)="themeService.setTheme(t.id)"
                    [class.theme-selected]="themeService.currentTheme.id === t.id">
                    <span>{{ t.name }}</span>
                </button>
            </div>
            <mat-divider></mat-divider>
            <div class="theme-menu-section" (click)="$event.stopPropagation()">
                <div class="theme-menu-label">Light</div>
                <button mat-menu-item *ngFor="let t of themeService.lightThemes"
                    (click)="themeService.setTheme(t.id)"
                    [class.theme-selected]="themeService.currentTheme.id === t.id">
                    <span>{{ t.name }}</span>
                </button>
            </div>
        </mat-menu>
        <span class="toolbar-spacer"></span>
        <span class="selected-file-name" [title]="this.selectedFileName">{{ this.selectedFileName }}</span>
        <button mat-icon-button aria-label="Import and export" matTooltip="Import and export"
            [matMenuTriggerFor]="importMenu">
            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="currentColor">
                <path
                    d="M720-320h146q17 0 28.5 11.5T906-280q0 17-11.5 28.5T866-240h-50l90 90q11 11 11 27.5T906-94q-12 12-28.5 12T849-94l-89-89v49q0 17-11.5 28.5T720-94q-17 0-28.5-11.5T680-134v-146q0-17 11.5-28.5T720-320ZM520-800v160q0 17 11.5 28.5T560-600h160L520-800Zm-280-80h287q16 0 30.5 6t25.5 17l194 194q11 11 17 25.5t6 30.5v167q0 17-11.5 28.5T760-400H640q-17 0-28.5 11.5T600-360v240q0 17-11.5 28.5T560-80H240q-33 0-56.5-23.5T160-160v-640q0-33 23.5-56.5T240-880Z" />
            </svg>
        </button>
        <mat-menu #importMenu="matMenu" class="import-menu-panel">
            <button mat-menu-item (click)="openFilePicker()">
                <span>Import files…</span>
            </button>
            <button mat-menu-item (click)="openSessionHistory()">
                <span>Imported sessions…</span>
            </button>
            <button mat-menu-item (click)="retryBurpImport()" *ngIf="burpImportStatus === 'error'">
                <span>Retry Burp import…</span>
            </button>
            <button mat-menu-item (click)="checkForBurpImport()" *ngIf="burpImportStatus === 'listening' || burpImportStatus === 'idle'">
                <span>Check for Burp export…</span>
            </button>
            <mat-divider></mat-divider>
            <button mat-menu-item (pointerdown)="saveCurrentFile('all')"
                [disabled]="!selectedFileName" *ngIf="exportFilterState.isSubset">
                <span>Save all…</span>
            </button>
            <button mat-menu-item (pointerdown)="saveCurrentFile('filtered')"
                [disabled]="!selectedFileName || !exportFilterState.isSubset" *ngIf="exportFilterState.isSubset">
                <span>Save filtered ({{ exportFilterState.visibleCount }})…</span>
            </button>
            <button mat-menu-item (pointerdown)="saveCurrentFile('all')"
                [disabled]="!selectedFileName" *ngIf="!exportFilterState.isSubset">
                <span>Save as…</span>
            </button>
        </mat-menu>
        <input #fileInput type="file" class="hidden" accept=".xml,*/*" multiple (change)="importFiles($event)" />
        <button mat-icon-button aria-label="Clear selected File" matTooltip="Clear selected File"
            (click)="fileRemoved()" *ngIf="this.selectedFileName">
            <mat-icon aria-hidden="false" aria-label="Clear selected File">
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"
                    fill="currentColor">
                    <path
                        d="m480-424 116 116q11 11 28 11t28-11q11-11 11-28t-11-28L536-480l116-116q11-11 11-28t-11-28q-11-11-28-11t-28 11L480-536 364-652q-11-11-28-11t-28 11q-11 11-11 28t11 28l116 116-116 116q-11 11-11 28t11 28q11 11 28 11t28-11l116-116Zm0 344q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Z" />
                </svg>
            </mat-icon>
        </button>
    </nav>
</mat-toolbar>
<mat-progress-bar *ngIf="isLoading || burpImportStatus === 'loading'" mode="indeterminate"></mat-progress-bar>
